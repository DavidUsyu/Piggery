services:
  db:
    image: postgres:16
    container_name: piggery_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-piggery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local .env file}
      POSTGRES_DB: ${POSTGRES_DB:-piggery_db}
    ports:
      - "5432:5432"
    volumes:
      - piggery_pgdata:/var/lib/postgresql/data

volumes:
  piggery_pgdata:
